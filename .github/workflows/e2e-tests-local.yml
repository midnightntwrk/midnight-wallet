name: E2E tests - local - nodejs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  MIDNIGHT_GH_USER: ${{ secrets.GH_USERNAME }}
  MIDNIGHT_GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
  NETWORK: 'undeployed'
  APP_INFRA_SECRET: ${{ secrets.APP_INFRA_SECRET }}

permissions: {}

jobs:
  test:
    name: E2E tests
    runs-on: ubuntu-latest-8-core-x64
    timeout-minutes: 80
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        version: [22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Log in to GitHub Container registry
        uses: docker/login-action@9fe7774c8f8ebfade96f0a62aa10f3882309d517
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Build wallet and install dependencies
        run: |
          yarn install
          yarn turbo dist

      - name: Run e2e tests
        run: |
          yarn turbo test-undeployed

      - name: Dump container diagnostics on failure
        if: failure()
        run: |
          echo "::group::docker ps -a"
          docker ps -a
          echo "::endgroup::"

          echo "::group::host memory + dmesg OOM scan"
          free -m || true
          (dmesg -T 2>/dev/null || sudo dmesg -T 2>/dev/null || true) | grep -iE 'oom|killed process' | tail -50 || true
          echo "::endgroup::"

          for c in $(docker ps -aq); do
            name=$(docker inspect --format='{{.Name}}' "$c" | sed 's|^/||')
            state=$(docker inspect --format='status={{.State.Status}} exit={{.State.ExitCode}} oom={{.State.OOMKilled}} error={{.State.Error}}' "$c")
            health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}n/a{{end}}' "$c")
            echo "::group::$name ($state health=$health)"
            docker logs --tail=300 "$c" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Publish wallet TS Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: success() || failure()
        with:
          name: Wallet TS packages Junit Tests Report
          reporter: java-junit
          path: |
            ./packages/e2e-tests/reports/test-report.xml
