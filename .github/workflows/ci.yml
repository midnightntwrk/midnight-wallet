name: CI

env:
  MIDNIGHT_GH_USER: ${{ secrets.GH_USERNAME }}
  MIDNIGHT_GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
  NETWORK: undeployed
  DEPLOYMENT: local
  APP_INFRA_SECRET: ${{ secrets.APP_INFRA_SECRET }}

on:
  workflow_dispatch:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run dist
        run: yarn dist

      - name: Save turbo cache
        if: always()
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-build-${{ github.run_attempt }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            packages/*/dist/**
            packages/*/tsconfig.*.tsbuildinfo

  general-checks:
    name: General Checks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore turbo cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-${{ github.run_attempt }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-
            turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-build-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-${{ github.run_id }}
          path: .

      # The following 4 steps are the equivalent of running `yarn verify:check`/`turbo verify:check`
      # They are separated into individual steps to give better visibility of the errors in the ci.
      # Future changes to verify:check should be reflected in these steps.
      - name: Run typecheck
        run: yarn typecheck

      - name: Run format check
        run: yarn format:check

      - name: Run linter
        run: yarn lint

      - name: Check barrel exports
        run: yarn check-barrel-exports

      - name: Save turbo cache
        if: always()
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-${{ github.run_attempt }}

  test-unit:
    name: Unit Tests
    needs: [general-checks]
    runs-on: ubuntu-latest
    # checks: write lets the junit-report action publish the unit test-result check-run.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore turbo cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-${{ github.run_attempt }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-${{ github.run_id }}
          path: .

      # Fast gate: pure unit tests only. No Docker pull, no infra.
      - name: Run unit tests
        run: yarn test:unit

      # annotate_only: this job's own status already reports unit pass/fail, so we
      # only want failure annotations on the diff. A check_name here would spawn a
      # detached check-run (owned by the generic "GitHub Actions" app) that GitHub
      # mis-groups under an unrelated suite ("Check for Changeset") — same root
      # cause as the integration reporter, see #520.
      - name: Publish Unit Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        if: success() || failure()
        with:
          annotate_only: true
          report_paths: |
            **/test-report*.xml

  # The per-file integration matrix lives in a reusable workflow and is invoked
  # here as a single job. GitHub nests the matrix jobs under this one caller in
  # the checks UI (many parallel runners, one tidy collapsible check), and this
  # job's status is the aggregate gate — green only if every file passed.
  # secrets: inherit passes APP_INFRA_SECRET and the GH tokens to the called workflow.
  integration:
    name: Integration Tests
    # Runs in parallel with test-unit and e2e-smoke (all gated only on general-checks)
    # to minimise wall-clock. build-publish still waits for all three.
    needs: [general-checks]
    # Grant here too: a reusable workflow's token is capped by the caller job's
    # permissions, so checks: write must be granted at the call site as well.
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  e2e-smoke:
    name: Smoke E2E
    # Runs in parallel with test-unit and integration (all gated only on general-checks).
    needs: [general-checks]
    runs-on: ubuntu-latest-8-core-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore turbo cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-${{ github.run_attempt }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-general-

      # The artifact is rooted at the package names (upload-artifact strips the
      # common `packages/` prefix), so extract into packages/ to restore dist to
      # packages/<pkg>/dist. Unlike test:unit/test:integration, test-undeployed
      # has no `^dist` dependency and never rebuilds, so it relies on this dist.
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-${{ github.run_id }}
          path: packages

      - name: Pre-pull Docker images
        run: docker compose -f infra/compose/docker-compose-dynamic.yml pull

      - name: Run smoke e2e tests
        run: |
          yarn dlx turbo test-undeployed -- -t @smoke

  # Single aggregate gate over all test stages. Produces the "Tests" status check
  # that branch protection requires (the old combined job was also named "Tests"),
  # and stays stable as integration files come and go. `if: always()` so it reports
  # a definitive pass/fail even when a stage fails.
  tests:
    name: Tests
    needs: [test-unit, integration, e2e-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate test results
        run: |
          echo "unit=${{ needs.test-unit.result }} integration=${{ needs.integration.result }} e2e=${{ needs.e2e-smoke.result }}"
          if [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "::error::One or more test stages did not pass."
            exit 1
          fi
          echo "All test stages passed."

  build-publish:
    name: Build for Publishing
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run dist:publish
        run: yarn dist:publish

      - name: Save turbo cache
        if: always()
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-build-publish-${{ github.run_attempt }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: build-publish-artifacts-${{ github.run_id }}
          path: |
            packages/*/dist/**
            packages/*/tsconfig.*.tsbuildinfo

  publish-checks:
    name: Publish Checks
    needs: [build-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ env.MIDNIGHT_GH_TOKEN }}"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore turbo cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-build-publish-${{ github.run_attempt }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-${{ github.run_id }}-build-publish-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-publish-artifacts-${{ github.run_id }}
          path: .
        continue-on-error: true

      - name: Run publint
        run: yarn publint
