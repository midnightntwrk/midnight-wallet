name: Fix @midnight-ntwrk dist-tags

# One-off migration maintenance, manual dispatch only. Moves the `latest` dist-tag
# on the transitional @midnight-ntwrk (dashed) alias scope to the highest published
# stable version, fixing tags that were stranded when the alias publish used the
# wrong npmjs token. Defaults to a dry-run; check `apply` to actually move the tags.
#
# Requires an npmjs token with @midnight-ntwrk publish rights in the
# MIDNIGHTCI_NPMJS_TOKEN secret. This is a token operation, not OIDC — Trusted
# Publishing is publish-only and cannot move dist-tags.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Actually move the tags. Leave unchecked for a dry-run.'
        type: boolean
        default: false

permissions: {}

jobs:
  fix-dist-tags:
    name: Fix stale @midnight-ntwrk latest tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          scope: '@midnight-ntwrk'

      - name: Move dist-tags (dry-run unless apply=true)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_NPMJS_TOKEN }}
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            node scripts/fix-alias-dist-tags.mjs
          else
            node scripts/fix-alias-dist-tags.mjs --dry-run
          fi
