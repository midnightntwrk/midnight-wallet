name: E2E tests

env:
  MIDNIGHT_GH_USER: ${{ secrets.GH_USERNAME }}
  MIDNIGHT_GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
  SEED_STABLE: ${{ secrets.E2E_TESTS_SEED_STABLE }}
  SYNC_CACHE: ${{ github.workspace }}/packages/e2e-tests/.sync_cache

  APP_INFRA_SECRET: ${{ secrets.APP_INFRA_SECRET }}

on:
  workflow_dispatch:
    inputs:
      network:
        type: choice
        description: Midnight network to use
        required: true
        default: 'preview'
        options:
          - qanet
          - preview
          - prepod
      seed:
        type: string
        description: Seed of a funded wallet (leave empty to use secret default)
        required: false
      seed2:
        type: string
        description: Seed of another receiving wallet (leave empty to use secret default)
        required: false
      nt_seed:
        type: string
        description: Seed of a funded wallet with native tokens (leave empty to use secret default)
        required: false
      nt_seed2:
        type: string
        description: Seed of another receiving wallet for native tokens (leave empty to use secret default)
        required: false
      modifier:
        type: string
        description: Suite or a testname to run (refer to Jest docs)
        required: false
      skip_cache:
        type: boolean
        description: Skip downloading sync cache (force fresh wallet sync)
        required: false
        default: false
      branch:
        type: string
        description: Branch to run the tests against
        required: false
        default: 'main'
  workflow_call:
    inputs:
      network:
        type: string
        description: Midnight network to use (testnet/devnet/undeployed)
        required: true
        default: 'devnet'
      seed:
        type: string
        description: Seed of a funded wallet
        required: false
      seed2:
        type: string
        description: Seed of another receiving wallet
        required: false
      nt_seed:
        type: string
        description: Seed of a funded wallet with native tokens
        required: false
      nt_seed2:
        type: string
        description: Seed of another receiving wallet for native tokens
        required: false
      modifier:
        type: string
        description: Suite or a testname to run (refer to Jest docs)
        required: false
      skip_cache:
        type: boolean
        description: Skip downloading sync cache (force fresh wallet sync)
        required: false
        default: false
      branch:
        type: string
        description: Branch to run the tests against (defaults to caller's ref)
        required: false
    secrets:
      GH_USERNAME:
        required: true
      MIDNIGHTBOT_PACKAGES_WRITE:
        required: true
      APP_INFRA_SECRET:
        required: true
      E2E_TESTS_SEED:
        required: true
      E2E_TESTS_SEED2:
        required: true
      E2E_TESTS_NT_SEED:
        required: true
      E2E_TESTS_NT_SEED2:
        required: true

permissions: {}

jobs:
  build:
    name: E2E tests
    runs-on: ubuntu-latest-8-core-x64
    timeout-minutes: 120
    permissions: write-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Determine the latest successful run ID with appropriate artifact
        if: inputs.skip_cache != true
        id: find_cache
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ env.MIDNIGHT_GH_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_NETWORK: ${{ inputs.network }}
          SYNC_CACHE_DIR: ${{ env.SYNC_CACHE }}
        run: |
          mkdir -p "$SYNC_CACHE_DIR"
          if LATEST_RUN_ID=$(./.github/scripts/find_run_id.sh "$REPO" "Healthcheck - $INPUT_NETWORK" ".sync_cache"); then
            echo "LATEST_RUN_ID=$LATEST_RUN_ID" >> $GITHUB_ENV
            echo "cache_found=true" >> $GITHUB_OUTPUT
          else
            echo "No sync cache found — wallets will sync from scratch"
            echo "cache_found=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: inputs.skip_cache != true && steps.find_cache.outputs.cache_found == 'true'
        continue-on-error: true
        with:
          run-id: ${{ env.LATEST_RUN_ID }}
          path: ${{ env.SYNC_CACHE }}
          github-token: ${{ env.MIDNIGHT_GH_TOKEN }}
          name: .sync_cache

      - name: Debug
        run: ls -a -R ./packages/e2e-tests

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
          token: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Check tool versions
        run: |
          node --version
          corepack --version
          yarn --version

      - name: Log in to GitHub Container registry
        uses: docker/login-action@9fe7774c8f8ebfade96f0a62aa10f3882309d517
        with:
          registry: 'https://ghcr.io'
          username: ${{ env.MIDNIGHT_GH_USER }}
          password: ${{ env.MIDNIGHT_GH_TOKEN }}

      - name: Configure yarn
        env:
          NPM_AUTH_TOKEN: ${{ env.MIDNIGHT_GH_TOKEN }}
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "$NPM_AUTH_TOKEN"

      - name: Build wallet and install dependencies
        run: |
          yarn install
          yarn turbo dist

      - name: Run e2e tests
        env:
          NETWORK: ${{ inputs.network }}
          SEED: ${{ inputs.seed || secrets.E2E_TESTS_SEED }}
          SEED2: ${{ inputs.seed2 || secrets.E2E_TESTS_SEED2 }}
          SEED_STABLE: ${{ env.SEED_STABLE }}
          NT_SEED: ${{ inputs.nt_seed || secrets.E2E_TESTS_NT_SEED }}
          NT_SEED2: ${{ inputs.nt_seed2 || secrets.E2E_TESTS_NT_SEED2 }}
          SYNC_CACHE: ${{ env.SYNC_CACHE }}
          APP_INFRA_SECRET: ${{ env.APP_INFRA_SECRET }}
          TEST_MODIFIER: ${{ inputs.modifier }}
        run: |
          yarn turbo test-remote -- $TEST_MODIFIER

      - name: Upload sync cache
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: .sync_cache
          path: ${{ env.SYNC_CACHE }}
          include-hidden-files: true

      - name: Publish wallet TS Test Report
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2
        if: success() || failure()
        with:
          name: Wallet TS packages Junit Tests Report
          reporter: java-junit
          path: |
            ./packages/e2e-tests/reports/test-report.xml
